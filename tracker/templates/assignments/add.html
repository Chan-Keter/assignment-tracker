{% extends "base.html" %}
{% block title %}Add Assignments{% endblock %}
{%block content%}
<div class = "container">   
    <div class="row justify-content-center">
        <div class="col mb-6">
        <h2 class="text-primary text-center">Add Assignment</h2>
        <form method="POST" class="card card-body shadow p-3">
        {% csrf_token %}
        {{form.as_p}}
        <button type="submit" class="btn btn-primary w-100">Save</button>
        </form>
    </div>
</div> 
{% endblock %}
