{% extends "base.html" %}
{% block title %}Projects{% endblock %}

{% block content %}
<h2>My Projects</h2>

<a href="{% url 'create_project' %}">Add Project</a>

{% for project in projects %}
<div style="margin-bottom:20px; border:1px solid #ccc; padding:15px; border-radius:10px;">

    <h3>{{ project.name }}</h3>

    <!-- GitHub Link -->
    <a href="{{ project.github_url }}" target="_blank">
        🔗 View on GitHub
    </a>

    <!-- Progress Bar -->
    <div style="background:#eee; width:100%; height:20px; margin-top:10px; border-radius:10px;">
        <div style="
            width: {{ project.progress }}%;
            background: green;
            height: 100%;
            border-radius:10px;
            text-align:center;
            color:white;
        ">
            {{ project.progress }}%
        </div>
    </div>

    <!-- UPDATE FORM -->
    <form method="POST" style="margin-top:10px;">
        {% csrf_token %}
        <input type="hidden" name="project_id" value="{{ project.id }}">

        <!-- SLIDER -->
        <input type="range"
               name="progress"
               min="0"
               max="100"
               value="{{ project.progress }}"
               oninput="this.nextElementSibling.value = this.value">

        <!-- SHOW VALUE -->
        <output>{{ project.progress }}</output>%

        <!-- BUTTON -->
        <br><br>
        <button type="submit">Update Progress</button>
    </form>

</div>
{% endfor %}
{% endblock %}
